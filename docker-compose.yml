services:
  postgres:
    image: postgres:16
    container_name: retize_postgres
    environment:
      POSTGRES_DB: retize_social
      POSTGRES_USER: retize_user
      POSTGRES_PASSWORD: retize_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/bootstrap:/docker-entrypoint-initdb.d:ro
      - ./queries:/queries:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retize_user -d retize_social"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-postgres:
    image: postgres:16
    container_name: airflow_postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: retize_airflow:local
    container_name: airflow_init
    depends_on:
      airflow-postgres:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
      AIRFLOW_CONN_RETIZE_SOCIAL: postgresql://retize_user:retize_password@retize_postgres:5432/retize_social
      POSTGRES_HOST: retize_postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: retize_social
      POSTGRES_USER: retize_user
      POSTGRES_PASSWORD: retize_password
      PYTHONPATH: /opt/airflow/project
    user: "${AIRFLOW_UID:-50000}:0"
    volumes: &airflow-common-volumes
      - ./:/opt/airflow/project
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username airflow --password airflow --firstname Data --lastname Engineering --role Admin --email airflow@example.com || true
      "

  airflow-webserver:
    image: retize_airflow:local
    container_name: airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes: *airflow-common-volumes
    ports:
      - "8080:8080"
    command: webserver

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit/Dockerfile
    container_name: retize_dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: retize_postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: retize_social
      POSTGRES_USER: retize_user
      POSTGRES_PASSWORD: retize_password
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  airflow-scheduler:
    image: retize_airflow:local
    container_name: airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes: *airflow-common-volumes
    command: scheduler

volumes:
  postgres_data:
  airflow_postgres_data:
