version: 2

models:
  - name: mart_content_performance
    description: Tabela analitica final com desempenho de conteudos de Instagram e TikTok.
    columns:
      - name: platform
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['instagram', 'tiktok']
      - name: content_id
        data_tests:
          - not_null
          - unique
      - name: account_name
        data_tests:
          - not_null
      - name: published_at
        data_tests:
          - not_null
      - name: publish_date
        data_tests:
          - not_null
      - name: weekday
        data_tests:
          - not_null
      - name: engagement_total
        data_tests:
          - not_null

  - name: mart_comment_sentiment
    description: Tabela analitica final com comentarios e sentimento de Instagram e TikTok.
    columns:
      - name: platform
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['instagram', 'tiktok']
      - name: content_id
        data_tests:
          - not_null
      - name: comment_id
        data_tests:
          - not_null
          - unique
      - name: comment_timestamp
        data_tests:
          - not_null
      - name: sentiment
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['positivo', 'neutro', 'negativo']

  - name: mart_content_with_sentiment
    description: Tabela analitica final com conteudos, engajamento e agregados de sentimento.
    columns:
      - name: platform
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['instagram', 'tiktok']
      - name: content_id
        data_tests:
          - not_null
          - unique
      - name: account_name
        data_tests:
          - not_null
      - name: content_format
        data_tests:
          - not_null
      - name: total_comments_with_sentiment
        data_tests:
          - not_null
